<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600..800&family=Hanken+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden}
.card{width:1200px;height:630px;background:#F4F6F1;position:relative;font-family:"Hanken Grotesk",sans-serif;padding:74px 84px;display:flex;flex-direction:column;justify-content:space-between}
.trace{position:absolute;inset:0;width:100%;height:100%;opacity:.5}
.top{display:flex;align-items:center;gap:16px;position:relative;z-index:2}
.mark{width:56px;height:56px}
.wordmark{font-family:"Bricolage Grotesque",sans-serif;font-weight:700;font-size:38px;letter-spacing:-.03em;color:#0E2A23}
h1{position:relative;z-index:2;font-family:"Bricolage Grotesque",sans-serif;font-weight:700;font-size:78px;line-height:1.02;letter-spacing:-.035em;color:#0E2A23;max-width:18ch}
h1 em{font-style:normal;color:#16A57B}
.foot{position:relative;z-index:2;display:flex;align-items:center;gap:14px;font-weight:600;font-size:24px;color:#3C504A}
.foot .dot{width:10px;height:10px;border-radius:50%;background:#16A57B}
.url{margin-left:auto;font-family:"Hanken Grotesk";font-weight:600;color:#0C5E4E}
</style></head>
<body>
<div class="card">
  <svg class="trace" viewBox="0 0 1200 630" preserveAspectRatio="none">
    <rect x="0" y="300" width="1200" height="150" fill="rgba(22,165,123,0.08)"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="rgba(22,165,123,0.28)" stroke-width="2" stroke-dasharray="2 9"/>
    <line x1="0" y1="450" x2="1200" y2="450" stroke="rgba(22,165,123,0.28)" stroke-width="2" stroke-dasharray="2 9"/>
    <path d="M-20,360 C120,120 220,150 320,360 S520,520 620,375 S840,300 940,372 S1120,372 1240,368" fill="none" stroke="#16A57B" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <circle cx="940" cy="372" r="9" fill="#16A57B"/>
  </svg>
  <div class="top">
    <svg class="mark" viewBox="0 0 64 64"><rect width="64" height="64" rx="16" fill="#0E2A23"/><rect x="9" y="27" width="46" height="13" rx="3.5" fill="#16A57B" opacity="0.22"/><path d="M7 40 C15 40 16 18 23 18 S32 46 39 33 S49 28 56 31" fill="none" stroke="#21C499" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="56" cy="31" r="5" fill="#21C499"/></svg>
    <span class="wordmark">Steady</span>
  </div>
  <h1>Stay <em>in range</em> without the constant mental math.</h1>
  <div class="foot"><span class="dot"></span> A calm companion for managing diabetes <span class="url">steadysyncdiabetes.com</span></div>
</div>
</body></html>
